<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutroVia — Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <div class="page-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="nav-logo" style="justify-content:center;margin-bottom:8px;">
                    <span class="logo-text">NUTROVIA</span><span class="logo-dot">.</span>
                </div>
                <h1 class="auth-title">Bienvenido/a de vuelta</h1>
                <p class="auth-subtitle">Accede a tu plan personalizado</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="tu@email.com" required
                        autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>
                <div id="login-alert" class="alert alert-error" style="display:none"></div>
                <button type="submit" class="btn-gold-large" style="width:100%;justify-content:center;margin-top:8px;"
                    id="loginBtn">
                    Entrar a mi plan
                </button>
            </form>

            <p style="text-align:center;margin-top:24px;font-size:13px;color:var(--text-muted);">
                ¿No tienes cuenta aún?
                <a href="questionnaire.html" style="color:var(--gold);font-weight:600;">Crear mi plan gratis</a>
            </p>
            <p style="text-align:center;margin-top:8px;">
                <a href="index.html" style="font-size:12px;color:var(--text-dim);">← Volver al inicio</a>
            </p>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display:none">
        <div class="spinner"></div>
        <p class="loading-text">Iniciando sesión...</p>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
