version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nutrovia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutrovia
      POSTGRES_PASSWORD: nutrovia123
      POSTGRES_DB: nutrovia_db
    ports:
      - "5432:5432"
    volumes:
      - nutrovia_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrovia -d nutrovia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nutrovia_pgdata:
    driver: local
